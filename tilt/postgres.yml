apiVersion: v1
kind: Service
metadata:
  name: postgresql-service
  namespace: atelier
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database

spec:
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database

  ports:
    - port: 5432
  clusterIP: "None"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-statefulset
  namespace: atelier
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/component: database
     
  serviceName: postgresql-service
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: database
        
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgresql-container
        image: postgres:latest
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "demo"
        volumeMounts:
        - mountPath: /var/lib/postgresql
          name: postgresql-volume
  volumeClaimTemplates:
  - metadata:
      name: postgresql-volume
      namespace: atelier
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi